version: "3.9"

# After-Life — Docker Compose
#
# Usage:
#   cp .env.example .env          # fill in API keys (ANTHROPIC, ELEVENLABS, PINECONE, etc.)
#   docker compose up             # start core services
#   docker compose up api         # start only the conversation API + dependencies
#   docker compose logs -f        # tail all logs
#
# Optional: Pinecone local emulator (for development without a cloud account):
#   docker compose --profile local-pinecone up
#   Set PINECONE_HOST=http://pinecone-local:5081 in .env to point services at it.
#
# QR pairing flow:
#   1. `docker compose up` — on first start the whatsapp-bot prints a QR code to stdout.
#      Read it: `docker compose logs whatsapp-bot`
#   2. Scan that QR with the **bot** WhatsApp account to link it.
#   3. Auth state is persisted in ./data/baileys-bot — no rescan needed on restart.
#   4. Message the bot account from your personal WhatsApp to begin onboarding.
#      The bot will send you a second QR for your personal account link.
#
# Worker services (voice-cloner, personality) are batch workers.
# Run them on demand:
#   docker compose run voice-cloner python -m services.voice-cloner.elevenlabs_cloner
#   docker compose run personality python -m services.personality.extractor
#
# Fixture replay (local dev only):
#   Place pre-recorded contact exports in ./data/fixtures/contacts/ and set
#   CONTACTS_DIR=/data/fixtures/contacts in .env to skip live sync.

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: afterlife-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional: Pinecone local emulator — activate with --profile local-pinecone
  # Provides a Pinecone-compatible HTTP API at http://pinecone-local:5081
  # Set PINECONE_HOST=http://pinecone-local:5081 in .env to use it.
  pinecone-local:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    container_name: afterlife-pinecone-local
    profiles:
      - local-pinecone
    ports:
      - "5081:5081"
    environment:
      - PORT=5081

  # ─── Application Services ────────────────────────────────────────────────────

  # 1. Conversation API — FastAPI backend powering persona conversations
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: afterlife-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
      - MONGODB_DB=${MONGODB_DB_NAME:-afterlife}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX:-afterlife-memories}
      - PINECONE_HOST=${PINECONE_HOST:-}
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # 2. WhatsApp Sync (Baileys) — bot interface + contact data sync
  whatsapp-bot:
    build:
      context: services/whatsapp-sync
      dockerfile: Dockerfile
    container_name: afterlife-whatsapp-bot
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["node", "dist/index.js", "--mode", "bot"]
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
      - MONGODB_DB=${MONGODB_DB_NAME:-afterlife}
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
      - CONTACTS_DIR=${CONTACTS_DIR:-/data/contacts}
      - ADMIN_JID=${ADMIN_JID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Baileys auth state — persists the bot QR link across restarts
      - ./data/baileys-bot:/app/baileys_auth_info
      - contacts_data:/data/contacts
    # QR code is logged to stdout on first start — run: docker compose logs whatsapp-bot

  # WhatsApp personal sync — optional service for syncing the user's own account
  whatsapp-personal-sync:
    build:
      context: services/whatsapp-sync
      dockerfile: Dockerfile
    container_name: afterlife-whatsapp-personal
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    command: ["node", "dist/index.js", "--mode", "personal"]
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
      - MONGODB_DB=${MONGODB_DB_NAME:-afterlife}
      - CONTACTS_DIR=${CONTACTS_DIR:-/data/contacts}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Per-user Baileys auth states are written here by the bot at runtime
      - ./data/baileys-personal:/app/personal_sessions
      - contacts_data:/data/contacts
    profiles:
      - personal-sync

  # 3. Voice Cloner — ElevenLabs voice clone pipeline (batch worker)
  voice-cloner:
    build:
      context: .
      dockerfile: services/voice-cloner/Dockerfile
    container_name: afterlife-voice-cloner
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
      - MONGODB_DB=${MONGODB_DB_NAME:-afterlife}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
    volumes:
      - contacts_data:/data/contacts
    # Batch worker — kept alive and invoked on demand:
    #   docker compose exec voice-cloner python -m services.voice-cloner.elevenlabs_cloner

  # 4. Personality — Claude-powered personality extraction + living biography (batch worker)
  personality:
    build:
      context: .
      dockerfile: services/personality/Dockerfile
    container_name: afterlife-personality
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
      - MONGODB_DB=${MONGODB_DB_NAME:-afterlife}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX:-afterlife-memories}
      - PINECONE_HOST=${PINECONE_HOST:-}
    volumes:
      - contacts_data:/data/contacts
    # Batch worker — kept alive and invoked on demand:
    #   docker compose exec personality python -m services.personality.extractor

volumes:
  mongodb_data:
  contacts_data:

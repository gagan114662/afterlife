name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Smoke ─────────────────────────────────────────────────────────────────
  # Fast import + health-endpoint check; no external services required.
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          for req in services/*/requirements.txt; do pip install -r "$req"; done
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Smoke check
        run: bash scripts/ci/smoke.sh

  # ── Verify ────────────────────────────────────────────────────────────────
  # Delegates entirely to the repo-local verifier: ruff lint + pytest +
  # targeted integration-path tests for any changed services.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for git merge-base (changed-service detection)
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio pytest-cov
          for req in services/*/requirements.txt; do pip install -r "$req"; done
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f tests/requirements.txt ]; then pip install -r tests/requirements.txt; fi

      - name: Verify (lint + tests + changed integration paths)
        run: bash scripts/ci/verify.sh --changed

  # ── TypeScript ────────────────────────────────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
        continue-on-error: true

      - name: Find TypeScript projects
        id: find-ts
        run: |
          TS_DIRS=$(find services -name "tsconfig.json" \
                     -not -path "*/node_modules/*" \
                     -exec dirname {} \; | tr '\n' ' ')
          echo "dirs=${TS_DIRS}" >> "$GITHUB_OUTPUT"
          if [ -z "$TS_DIRS" ]; then
            echo "no_ts=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck + test TypeScript projects
        if: steps.find-ts.outputs.no_ts != 'true'
        run: |
          for dir in ${{ steps.find-ts.outputs.dirs }}; do
            echo "→ $dir"
            cd "$dir"
            npm ci
            npx tsc --noEmit
            npm test
            cd "$OLDPWD"
          done

  # ── Security scan ─────────────────────────────────────────────────────────
  # Runs bandit on Python services; requires_security_scan=true per repo
  # contract.  Excludes the TypeScript whatsapp-sync service.
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit (MEDIUM+ severity)
        run: |
          bandit -r services/ -ll -iii \
            --exclude services/whatsapp-sync \
            -q
